<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="45%" cy="42%" r="85%">
      <stop offset="0%" stop-color="#111820"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Globe sphere — lit from upper-left -->
    <radialGradient id="sphere" cx="33%" cy="26%" r="80%">
      <stop offset="0%"   stop-color="#1e3d65"/>
      <stop offset="30%"  stop-color="#0f2040"/>
      <stop offset="70%"  stop-color="#060f22"/>
      <stop offset="100%" stop-color="#02060e"/>
    </radialGradient>

    <!-- Edge falloff → makes it feel spherical -->
    <radialGradient id="edge" cx="50%" cy="50%" r="50%">
      <stop offset="64%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.82"/>
    </radialGradient>

    <!-- Specular highlight -->
    <radialGradient id="shine" cx="31%" cy="25%" r="48%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Atmosphere rim -->
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="80%"  stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.30"/>
    </radialGradient>

    <!-- Grid line glow -->
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Outer atmosphere haze -->
    <filter id="haze" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <!-- Pin glow -->
    <filter id="pinglow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="gc"><circle cx="512" cy="512" r="370"/></clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Faint star field -->
  <g fill="white" opacity="0.55">
    <circle cx="88"  cy="104" r="1.3"/>
    <circle cx="210" cy="55"  r="1.0"/>
    <circle cx="930" cy="170" r="1.5"/>
    <circle cx="860" cy="78"  r="0.9"/>
    <circle cx="140" cy="890" r="1.2"/>
    <circle cx="945" cy="855" r="1.0"/>
    <circle cx="755" cy="948" r="1.3"/>
    <circle cx="62"  cy="510" r="0.9"/>
    <circle cx="965" cy="605" r="1.1"/>
    <circle cx="680" cy="66"  r="0.9"/>
    <circle cx="316" cy="962" r="0.8"/>
    <circle cx="490" cy="40"  r="0.7"/>
    <circle cx="38"  cy="340" r="1.0"/>
    <circle cx="988" cy="420" r="0.8"/>
  </g>

  <!-- ── Atmosphere outer glow ── -->
  <circle cx="512" cy="512" r="378" fill="#1470b0" opacity="0.35" filter="url(#haze)"/>

  <!-- ── Globe sphere ── -->
  <circle cx="512" cy="512" r="370" fill="url(#sphere)"/>

  <!-- ── Grid lines (clipped to sphere) ── -->
  <g clip-path="url(#gc)" filter="url(#glow)">

    <!-- Parallels (latitude) — equator bold, others fading -->
    <g fill="none" stroke="#38bdf8">
      <!-- 60 °N  y = 512 − 370·sin60 = 512 − 320 = 192   rx = 370·cos60 = 185 -->
      <ellipse cx="512" cy="192" rx="185" ry="11" stroke-width="1.3" opacity="0.45"/>
      <!-- 30 °N  y = 512 − 185 = 327                      rx = 320 -->
      <ellipse cx="512" cy="327" rx="320" ry="15" stroke-width="1.7" opacity="0.62"/>
      <!-- Equator  y = 512                                  rx = 370 -->
      <ellipse cx="512" cy="512" rx="370" ry="19" stroke-width="2.8" opacity="0.88"/>
      <!-- 30 °S  y = 697                                   rx = 320 -->
      <ellipse cx="512" cy="697" rx="320" ry="15" stroke-width="1.7" opacity="0.62"/>
      <!-- 60 °S  y = 832                                   rx = 185 -->
      <ellipse cx="512" cy="832" rx="185" ry="11" stroke-width="1.3" opacity="0.45"/>
    </g>

    <!-- Meridians (longitude) -->
    <g fill="none" stroke="#38bdf8">
      <!-- Central meridian -->
      <line x1="512" y1="142" x2="512" y2="882" stroke-width="2.2" opacity="0.55"/>
      <!-- ±45 °  rx = 370·sin45 = 262 -->
      <ellipse cx="512" cy="512" rx="262" ry="370" stroke-width="1.6" opacity="0.50"/>
      <!-- ±72 °  rx = 370·sin72 = 352  (just inside globe edge) -->
      <ellipse cx="512" cy="512" rx="352" ry="370" stroke-width="1.2" opacity="0.35"/>
    </g>
  </g>

  <!-- ── Edge shadow (sphere depth) ── -->
  <circle cx="512" cy="512" r="370" fill="url(#edge)"/>

  <!-- ── Atmosphere rim ── -->
  <circle cx="512" cy="512" r="370" fill="url(#rim)"/>

  <!-- ── Globe border ring ── -->
  <circle cx="512" cy="512" r="370" fill="none" stroke="#7dd3fc" stroke-width="2.2" opacity="0.55"/>

  <!-- ── Specular shine ── -->
  <circle cx="512" cy="512" r="370" fill="url(#shine)"/>

  <!-- ── Location pin — ~48 °N 15 °E (Central Europe) ──
       x = 512 + 370·cos48·sin15 = 512 + 64 = 576
       y = 512 − 370·sin48       = 512 − 275 = 237
  ── -->
  <g filter="url(#pinglow)">
    <circle cx="576" cy="237" r="9"  fill="#ffffff" opacity="0.96"/>
    <circle cx="576" cy="237" r="5"  fill="#38bdf8"/>
  </g>
  <circle cx="576" cy="237" r="19" fill="none" stroke="#38bdf8" stroke-width="1.6" opacity="0.55"/>
  <circle cx="576" cy="237" r="32" fill="none" stroke="#38bdf8" stroke-width="1.0" opacity="0.28"/>
</svg>
