<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- Brushstroke texture — subtle displacement for hand-painted feel -->
    <filter id="brush" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.022" numOctaves="4" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Dot pulse glow -->
    <filter id="dotglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to globe circle -->
    <clipPath id="gc"><circle cx="512" cy="512" r="308"/></clipPath>

  </defs>

  <!-- ═══════════════════════════════════════════════
       BACKGROUND — warm white
  ═══════════════════════════════════════════════ -->
  <rect width="1024" height="1024" fill="#F6F1E9"/>

  <!-- ═══════════════════════════════════════════════
       MONDRIAN COLOR BLOCKS
       Layout follows the golden ratio:
         φ ≈ 1.618   →   1024/φ ≈ 633   →   1024−633 = 391
         Key verticals:  x = 391,  x = 636
         Key horizontals: y = 391, y = 636
  ═══════════════════════════════════════════════ -->

  <!-- Large RED block — top-right quadrant -->
  <rect x="636" y="0"   width="388" height="391" fill="#C8102E"/>
  <!-- BLUE block — bottom-left -->
  <rect x="0"   y="636" width="391" height="388" fill="#003082"/>
  <!-- YELLOW accent — bottom-right -->
  <rect x="636" y="750" width="388" height="274" fill="#F9B200"/>
  <!-- Small BLACK accent — top-left -->
  <rect x="0"   y="0"   width="168" height="168" fill="#1A1A1A"/>

  <!-- ═══════════════════════════════════════════════
       MONDRIAN GRID LINES — thick, flat, square caps
  ═══════════════════════════════════════════════ -->
  <g stroke="#1A1A1A" stroke-linecap="square" fill="none">
    <!-- Canvas border -->
    <rect x="0" y="0" width="1024" height="1024" stroke-width="18"/>
    <!-- Primary verticals -->
    <line x1="391"  y1="0"    x2="391"  y2="1024" stroke-width="13"/>
    <line x1="636"  y1="0"    x2="636"  y2="1024" stroke-width="13"/>
    <!-- Primary horizontals -->
    <line x1="0"    y1="391"  x2="1024" y2="391"  stroke-width="13"/>
    <line x1="0"    y1="636"  x2="1024" y2="636"  stroke-width="13"/>
    <!-- Secondary — divides yellow from white (bottom-right) -->
    <line x1="636"  y1="750"  x2="1024" y2="750"  stroke-width="10"/>
    <!-- Secondary — divides black from white (top-left) -->
    <line x1="168"  y1="0"    x2="168"  y2="391"  stroke-width="10"/>
  </g>

  <!-- ═══════════════════════════════════════════════
       GLOBE SKELETON — brushstroke wireframe
       Radius 308, centered at 512,512.
       Lines are bold, round-capped, displacement-filtered
       for a hand-painted quality.
  ═══════════════════════════════════════════════ -->
  <g filter="url(#brush)" fill="none" stroke="#1A1A1A"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer circle — the globe boundary -->
    <circle cx="512" cy="512" r="308" stroke-width="14"/>

    <!-- Equator — bold, widest ellipse -->
    <ellipse cx="512" cy="512" rx="308" ry="56"  stroke-width="10"/>

    <!-- 35°N latitude: y = 512 − 308·sin35 ≈ 512 − 177 = 335, rx = 308·cos35 ≈ 252 -->
    <ellipse cx="512" cy="335" rx="252" ry="44"  stroke-width="7"/>

    <!-- 35°S latitude: y = 689, rx = 252 -->
    <ellipse cx="512" cy="689" rx="252" ry="44"  stroke-width="7"/>

    <!-- Prime meridian — slim vertical ellipse -->
    <ellipse cx="512" cy="512" rx="52"  ry="308" stroke-width="8"/>

    <!-- ~55° meridian: rx = 308·sin55 ≈ 252 -->
    <ellipse cx="512" cy="512" rx="252" ry="308" stroke-width="6"/>

  </g>

  <!-- ═══════════════════════════════════════════════
       LOCATION DOT
       Placed at ~42°N 14°E — central Italy / visible face
       x = 512 + 308·cos42·sin14 ≈ 512 + 52 = 564
       y = 512 − 308·sin42       ≈ 512 − 206 = 306
  ═══════════════════════════════════════════════ -->
  <g filter="url(#dotglow)">
    <!-- Outer glow ring -->
    <circle cx="564" cy="306" r="30" fill="none" stroke="#F9B200" stroke-width="2.5" opacity="0.55"/>
    <!-- Dot body -->
    <circle cx="564" cy="306" r="17" fill="#1A1A1A"/>
    <circle cx="564" cy="306" r="9"  fill="#F9B200"/>
  </g>

</svg>
